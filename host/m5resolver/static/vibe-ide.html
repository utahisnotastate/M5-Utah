<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>m5-utah // Vibe Gateway</title>
  <style>
    body { background: #0d1117; color: #58a6ff; font-family: 'Courier New', ui-monospace, monospace; padding: 30px; margin: 0; }
    .container { max-width: 900px; margin: 0 auto; border: 1px solid #30363d; padding: 20px; background: #161b22; border-radius: 6px; }
    h1 { color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 10px; font-size: 1.15rem; }
    h3 { color: #79c0ff; margin-bottom: 8px; }
    button { background: #238636; color: #fff; border: 1px solid #2ea043; padding: 12px 24px; font-weight: bold; cursor: pointer; border-radius: 6px; margin-right: 8px; }
    button:hover { background: #2ea043; }
    button.secondary { background: #1f6feb; border-color: #388bfd; }
    button.secondary:hover { background: #388bfd; }
    input[type=text] { width: 72%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; border-radius: 6px; }
    #connection-status { margin-left: 15px; color: #f85149; }
    #log-stream { background: #0d1117; border: 1px solid #30363d; height: 250px; overflow-y: scroll; padding: 15px; color: #7ee787; margin-top: 12px; border-radius: 6px; white-space: pre-wrap; font-size: 0.9rem; }
    .hint { color: #8b949e; font-size: 0.85rem; margin-bottom: 16px; }
    .row { margin-top: 22px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>m5-utah // Intent-First Silicon Framework</h1>
    <p class="hint">Zero-install WebSerial IDE — natural language compiles to schema-validated intents and zero-allocation binwire frames.</p>

    <div class="row">
      <button id="connect-btn" class="secondary">1. CONNECT TO SILICON VIA WEBUSB/SERIAL</button>
      <span id="connection-status">Disconnected</span>
    </div>

    <div class="row">
      <h3>2. VIBE-CODE INTENT INTERFACE</h3>
      <input id="prompt-input" type="text" placeholder="e.g., Blink GPIO pin 10 at 50Hz frequency mask" />
      <button id="dispatch-btn">DISPATCH INTENT</button>
      <button id="dryrun-btn" class="secondary">DRY RUN</button>
    </div>

    <div class="row">
      <h3>3. SYSTEM DIAGNOSTIC TELEMETRY LOGGER</h3>
      <div id="log-stream"></div>
    </div>
  </div>

  <script>
    let serialPort;
    let readLoopActive = false;

    const logEl = document.getElementById('log-stream');
    const statusEl = document.getElementById('connection-status');

    function log(line, color = '#7ee787') {
      const span = document.createElement('div');
      span.style.color = color;
      span.textContent = line;
      logEl.appendChild(span);
      logEl.scrollTop = logEl.scrollHeight;
    }

    document.getElementById('connect-btn').addEventListener('click', async () => {
      if (!('serial' in navigator)) {
        log('[CONNECTION ERROR] WebSerial not supported — use Chrome or Edge.', '#f85149');
        return;
      }
      try {
        serialPort = await navigator.serial.requestPort();
        await serialPort.open({ baudRate: 115200 });
        statusEl.textContent = 'Connected Securely to Core';
        statusEl.style.color = '#58a6ff';
        streamIncomingDeviceLogs();
      } catch (err) {
        log('[CONNECTION ERROR] ' + err, '#f85149');
      }
    });

    async function streamIncomingDeviceLogs() {
      if (readLoopActive || !serialPort) return;
      readLoopActive = true;
      const textDecoder = new TextDecoderStream();
      serialPort.readable.pipeTo(textDecoder.writable);
      const reader = textDecoder.readable.getReader();
      try {
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          if (value) log(value.trimEnd());
        }
      } catch (error) {
        console.error(error);
      } finally {
        reader.releaseLock();
        readLoopActive = false;
      }
    }

    async function compileWirePayload(prompt) {
      const response = await fetch('/compile_vibe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });
      if (!response.ok) {
        const errBody = await response.json();
        throw new Error((errBody.errors || ['compile failed']).join('; '));
      }
      const wireFormat = response.headers.get('X-Wire-Format') || 'json';
      const intentHeader = response.headers.get('X-Intent-Json');
      const arrayBufferData = await response.arrayBuffer();
      return {
        bytes: new Uint8Array(arrayBufferData),
        wireFormat,
        intent: intentHeader ? JSON.parse(intentHeader) : null
      };
    }

    document.getElementById('dispatch-btn').addEventListener('click', async () => {
      const descriptionPrompt = document.getElementById('prompt-input').value;
      if (!descriptionPrompt.trim()) {
        log('[FLUXWIRE] Empty prompt — type a vibe requirement first.', '#ffd27a');
        return;
      }
      try {
        const compiled = await compileWirePayload(descriptionPrompt);
        log('[FLUXWIRE] Compiled (' + compiled.wireFormat + '): ' + JSON.stringify(compiled.intent), '#79c0ff');
        if (!serialPort || !serialPort.writable) {
          log('[FLUXWIRE] Compile OK — connect WebSerial to inject.', '#ffd27a');
          return;
        }
        const writer = serialPort.writable.getWriter();
        await writer.write(compiled.bytes);
        writer.releaseLock();
        if (compiled.wireFormat === 'fastpath') {
          log('[FLUXWIRE] Zero-allocation binwire token pushed (' + compiled.bytes.length + ' bytes).');
        } else {
          log('[FLUXWIRE] JSON intent line pushed over WebSerial.');
        }
      } catch (err) {
        log('[FLUXWIRE ERROR] ' + err, '#f85149');
      }
    });

    document.getElementById('dryrun-btn').addEventListener('click', async () => {
      const descriptionPrompt = document.getElementById('prompt-input').value;
      try {
        const res = await fetch('/generate_intent', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: descriptionPrompt, dry_run: true })
        });
        const body = await res.json();
        if (!res.ok) throw new Error((body.errors || ['dry run failed']).join('; '));
        log('[DRY RUN] wire=' + body.wire_format + ' intent=' + JSON.stringify(body.intent), '#ffd27a');
      } catch (err) {
        log('[DRY RUN ERROR] ' + err, '#f85149');
      }
    });
  </script>
</body>
</html>
