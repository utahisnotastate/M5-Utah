name: Schema and Intent Integration Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./host
          pip install pytest

      - name: Validate JSON syntax
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          targets = (
              list(Path("schemas").glob("*.json"))
              + list(Path("registry").glob("*.json"))
              + list(Path("examples").glob("*.json"))
              + list(Path("projects").glob("*.json"))
          )
          for p in targets:
              json.loads(p.read_text(encoding="utf-8"))
              print(f"ok: {p}")
          PY

      - name: Run pytest validation matrices
        run: pytest tests/ -v --tb=short
