name: m5-utah CI/CD Core Validation Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

concurrency:
  group: m5utah-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-host-plane:
    name: Python orchestration matrix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repository trunk
        uses: actions/checkout@v4

      - name: Set up Python application environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            host/pyproject.toml

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./host
          pip install pytest jsonschema flake8

      - name: Enforce structural syntax fences (flake8 critical)
        run: |
          flake8 host/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Validate JSON schema and registry artifacts
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          targets = (
              list(Path("schemas").glob("*.json"))
              + list(Path("registry").glob("*.json"))
              + list(Path("examples").glob("*.json"))
              + list(Path("projects").glob("*.json"))
          )
          for path in targets:
              json.loads(path.read_text(encoding="utf-8"))
              print(f"ok: {path}")
          PY

      - name: Trigger core pytest automation harness
        run: pytest tests/ -v --tb=short

      - name: Contract smoke — scheduler and bitmapped delta compilers
        run: |
          python - <<'PY'
          from m5resolver.delta_engine import BitmappedDeltaCompiler
          from m5resolver.scheduler_compiler import HostSchedulerCompiler

          frame = BitmappedDeltaCompiler.compile_bitmap_delta(2, 250, 1024)
          assert frame[:2] == b"\x23\x44"
          assert len(frame) == 10

          optimized = HostSchedulerCompiler.compute_priority_matrix(
              {"units": {"sensor_a": {"type": "gpio", "pins": [13], "frequency_hz": 100}}}
          )
          assert "units" in optimized
          print("compiler contracts ok")
          PY

  validate-firmware-core:
    name: Embedded firmware compilation matrix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repository trunk
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO core toolchain
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Execute deterministic firmware compilation pass (CoreS3)
        working-directory: firmware
        run: pio run -e m5stack-cores3

      - name: Execute firmware compilation pass (Core ESP32 reference)
        working-directory: firmware
        run: pio run -e m5stack-core-esp32
