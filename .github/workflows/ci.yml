name: CI

on:
  push:
  pull_request:

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install host package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ./host
          pip install pytest

      - name: Run tests
        run: pytest
