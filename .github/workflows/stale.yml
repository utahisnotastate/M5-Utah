name: Stale Issues and PRs

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale
        uses: actions/stale@v10
        with:
          stale-issue-message: "This issue is stale due to inactivity. It will close automatically unless updated."
          stale-pr-message: "This PR is stale due to inactivity. It will close automatically unless updated."
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "security,pinned"
          days-before-stale: 30
          days-before-close: 7
