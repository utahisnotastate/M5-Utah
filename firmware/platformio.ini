; m5-utah firmware — dual-core M5Stack targets (CI + local)
[platformio]
default_envs = m5stack-cores3

[env:m5stack-cores3]
platform = espressif32
board = m5stack-cores3
framework = arduino
monitor_speed = 115200
upload_speed = 1500000
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -O3
lib_deps =
  m5stack/M5Unified@^0.2.7
  bblanchon/ArduinoJson@^7.0.4

[env:m5stack-core-esp32]
platform = espressif32
board = m5stack-core-esp32
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -O3
lib_deps =
  m5stack/M5Unified@^0.2.7
  bblanchon/ArduinoJson@^7.0.4
